version: "2"

linters:
  enable:
    # defaults (already on: errcheck, govet, staticcheck, ineffassign, unused)
    - bodyclose          # unclosed HTTP response bodies
    - errorlint          # error wrapping best practices
    - gocritic           # style & performance checks
    - gosec              # security audit
    - misspell           # typo detector
    - noctx              # HTTP requests missing context
    - unconvert          # unnecessary type conversions
    - usestdlibvars      # use standard library constants

  disable:
    - exhaustruct        # too strict for this project
    - gochecknoglobals   # project uses globals by design
    - wsl                # opinionated whitespace

run:
  timeout: 3m

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    # Allow underscore error ignores in hot paths (proxy scanning)
    - path: internal/scanner/
      linters:
        - errcheck
    - path: internal/rotator/
      linters:
        - errcheck

severity:
  default-severity: warning
