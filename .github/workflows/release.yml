name: Build & Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

env:
  APP_NAME: raced_proxy

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

  version:
    name: Read Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.getver.outputs.version }}
      tag: ${{ steps.getver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from commit hash
        id: getver
        run: |
          HASH=$(git rev-parse --short HEAD)
          echo "version=${HASH}" >> "$GITHUB_OUTPUT"
          echo "tag=build-${HASH}" >> "$GITHUB_OUTPUT"
          echo "Version: ${HASH}"

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [version, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          V=${{ needs.version.outputs.version }}
          BINARY="${APP_NAME}"
          if [ "$GOOS" = "windows" ]; then
            BINARY="${APP_NAME}.exe"
          fi
          go build -trimpath -ldflags="-s -w -X main.Version=${V}" -o "dist/${BINARY}" ./cmd/raced_proxy/main.go

      - name: Package zip
        run: |
          V=${{ needs.version.outputs.version }}
          cp .env.example dist/
          cd dist
          ZIP_NAME="${APP_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}-${V}.zip"
          BINARY="${APP_NAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="${APP_NAME}.exe"
          fi
          zip "$ZIP_NAME" "$BINARY" .env.example
          echo "Created ${ZIP_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show artifacts
        run: |
          echo "Release artifacts:"
          find artifacts -type f -name '*.zip' -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Build ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*.zip
