name: Build & Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

env:
  APP_NAME: raced_proxy

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version from commit message
        id: bump
        run: |
          VERSION=$(grep '^version=' file.properties | cut -d= -f2)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -qEi 'BREAKING CHANGE|^\[major\]'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_MSG" | grep -qEi '^\[minor\]'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          sed -i "s/^version=.*/version=${NEW_VERSION}/" file.properties
          echo "Bumped ${VERSION} -> ${NEW_VERSION}"

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add file.properties
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY="${APP_NAME}"
          if [ "$GOOS" = "windows" ]; then
            BINARY="${APP_NAME}.exe"
          fi
          go build -trimpath -ldflags="-s -w -X main.Version=${{ needs.version.outputs.version }}" -o "dist/${BINARY}" ./cmd/raced_proxy/main.go

      - name: Package zip
        run: |
          cp .env.example url-list.txt dist/
          cd dist
          ZIP_NAME="${APP_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}-${{ needs.version.outputs.version }}.zip"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "$ZIP_NAME" "${APP_NAME}.exe" .env.example url-list.txt
          else
            zip "$ZIP_NAME" "${APP_NAME}" .env.example url-list.txt
          fi
          echo "Created ${ZIP_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show artifacts
        run: |
          echo "Release artifacts:"
          find artifacts -type f -name '*.zip' -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*.zip
